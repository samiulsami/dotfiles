config_version = 2
default_model = "deepseek-flash/deepseek-v4-flash"
language = "en"

[ui]
theme = "auto"

[notifications]
enabled = true
turn_done = true
approval_request = true
ask_request = true

[network]
proxy_mode = "auto"

[network.proxy]
type = "socks5"

[agent]
max_steps = 0
planner_max_steps = 12
temperature = 0.0
auto_plan = "off"
soft_compact_ratio = 0.5
compact_ratio = 0.8
compact_force_ratio = 0.9
cold_resume_prune = true
subagent_model = "deepseek-flash"

[[providers]]
name = "deepseek-flash"
kind = "openai"
base_url = "https://api.deepseek.com"
models = ["deepseek-v4-flash"]
default = "deepseek-v4-flash"
effort = "high"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price = { cache_hit = 0.0028, input = 0.14, output = 0.28, currency = "$" }

[[providers]]
name = "deepseek-pro"
kind = "openai"
base_url = "https://api.deepseek.com"
models = ["deepseek-v4-pro"]
default = "deepseek-v4-pro"
effort = "auto"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price = { cache_hit = 0.003625, input = 0.435, output = 0.87, currency = "$" }

[tools]
enabled = []
bash_timeout_seconds = 120

[builtin_mcp]
time_enabled = true
context7_enabled = true

[[plugins]]
name = "exa"
type = "http"
url = "https://mcp.exa.ai/mcp"
headers = { "x-api-key" = "${EXA_API_KEY}" }

[lsp]
enabled = true

[permissions]
mode = "ask"
