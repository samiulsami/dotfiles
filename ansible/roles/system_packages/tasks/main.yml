---
- name: Update pacman package cache
  pacman:
    update_cache: yes

- name: Install base system packages
  pacman:
    name:
      - curl
      - wget
      - git
      - tk  # git-gui equivalent
      - base-devel
      - ca-certificates
      - gnupg
      - python-pip
      - jq
      - ffmpeg
      - p7zip
      - imagemagick
      - fd
      - bat
      - ripgrep
    state: present

- name: Configure GNOME settings (if available)
  become_user: "{{ user }}"
  shell: |
    if command -v gsettings >/dev/null 2>&1; then
      gsettings set org.gnome.desktop.peripherals.mouse accel-profile 'flat'
      gsettings set org.gnome.desktop.screensaver lock-enabled false
      gsettings set org.gnome.desktop.session idle-delay 0
    fi
  ignore_errors: yes
  tags: gnome

- name: Increase file watch limits
  lineinfile:
    path: /etc/sysctl.conf
    line: "fs.inotify.max_user_watches=524288"
    create: yes
  notify: reload sysctl

- name: Fix keyboard Fn keys for Apple keyboards
  lineinfile:
    path: /etc/modprobe.d/hid_apple.conf
    line: "options hid_apple fnmode=0"
    create: yes
  notify: update initramfs

- name: Add GitHub CLI repository
  shell: |
    mkdir -p -m 755 /etc/apt/keyrings
    wget -nv -O- https://cli.github.com/packages/githubcli-archive-keyring.gpg | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
    chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/github-cli.list

- name: Install GitHub CLI
  apt:
    name: gh
    state: present
    update_cache: yes

- name: Add OBS Studio repository
  apt_repository:
    repo: "ppa:obsproject/obs-studio"
    state: present
    update_cache: yes

- name: Install OBS Studio
  apt:
    name: obs-studio
    state: present

- name: Add Cloudflare Warp repository (optional)
  shell: |
    curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/cloudflare-client.list
  args:
    creates: /etc/apt/sources.list.d/cloudflare-client.list
  when: install_cloudflare_warp | default(false)

- name: Install Cloudflare Warp (optional)
  apt:
    name: cloudflare-warp
    state: present
    update_cache: yes
  when: install_cloudflare_warp | default(false)
