---
- name: Update pacman package cache
  pacman:
    update_cache: yes
  tags: always

- name: Install base system packages
  pacman:
    name:
      - curl
      - wget
      - git
      - git-gui
      - base-devel
      - ca-certificates
      - gnupg
      - python-pip
      - jq
      - ffmpeg
      - p7zip
      - imagemagick
      - fd
      - bat
      - ripgrep
      - zoxide
      - tmux
      - zsh
      - npm
      - libnotify
    state: present
  tags: packages

- name: Configure GNOME settings (if available)
  become_user: "{{ user }}"
  shell: |
    if command -v gsettings >/dev/null 2>&1; then
      gsettings set org.gnome.desktop.peripherals.mouse accel-profile 'flat'
      gsettings set org.gnome.desktop.screensaver lock-enabled false
      gsettings set org.gnome.desktop.session idle-delay 0
    fi
  ignore_errors: yes
  tags: gnome

- name: Increase file watch limits
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: '524288'
    state: present
    reload: yes
  tags: system

- name: Fix keyboard Fn keys for Apple keyboards
  lineinfile:
    path: /etc/modprobe.d/hid_apple.conf
    line: "options hid_apple fnmode=0"
    create: yes
  notify: update initramfs

- name: Install GitHub CLI
  pacman:
    name: github-cli
    state: present
  tags: packages

- name: Install OBS Studio
  pacman:
    name: obs-studio
    state: present
  tags: packages

- name: Install Cloudflare Warp from AUR (optional)
  community.general.pacman:
    name: cloudflare-warp-bin
    state: present
    executable: yay
  become_user: "{{ user }}"
  when: install_cloudflare_warp | default(false)
  ignore_errors: yes
  tags: aur

- name: Register Cloudflare Warp (optional)
  shell: warp-cli registration new
  when: install_cloudflare_warp | default(false)
  ignore_errors: yes
