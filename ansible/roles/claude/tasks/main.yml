---
- name: Install Claude Code
  when: install_claude_code | default(true)
  block:
    - name: Get fnm node path
      shell: "{{ home }}/.local/share/fnm/fnm env --use-on-cd | grep 'export PATH' | cut -d'=' -f2 | tr -d '\"'"
      register: fnm_node_path
      become_user: "{{ user }}"
      changed_when: false

    - name: Install Claude Code via npm
      shell: "{{ home }}/.local/share/fnm/fnm exec --using={{ node_version }} npm install -g @anthropic-ai/claude-code"
      become_user: "{{ user }}"
      environment:
        PATH: "{{ fnm_node_path.stdout }}:{{ ansible_env.PATH }}"

    - name: Verify Claude Code installation
      shell: "{{ home }}/.local/share/fnm/fnm exec --using={{ node_version }} claude --version"
      register: claude_version
      changed_when: false
      become_user: "{{ user }}"
      environment:
        PATH: "{{ fnm_node_path.stdout }}:{{ ansible_env.PATH }}"
      ignore_errors: yes

    - name: Display Claude Code version
      debug:
        msg: "Claude Code installed successfully: {{ claude_version.stdout if claude_version.rc == 0 else 'Installation completed but version check failed' }}"
