---
- name: Neovim Configuration and Installation
  when: install_neovim | default(true)
  block:
    - name: Install Neovim build dependencies
      apt:
        name:
          - build-essential
          - unzip
          - python3.12-venv
          - xclip
          - cmake
          - gettext
        state: present
        update_cache: yes

    - name: Check if Neovim source directory exists
      stat:
        path: "{{ home }}/neovim"
      register: neovim_source_exists

    - name: Clone Neovim repository
      git:
        repo: https://github.com/neovim/neovim.git
        dest: "{{ home }}/neovim"
        depth: 1
        force: yes
      become_user: "{{ user }}"
      when: not neovim_source_exists.stat.exists

    - name: Build Neovim from source
      shell: |
        cd {{ home }}/neovim
        make CMAKE_BUILD_TYPE=RelWithDebInfo
      become_user: "{{ user }}"
      register: neovim_build
      changed_when: neovim_build.rc == 0

    - name: Install Neovim system-wide
      shell: |
        cd {{ home }}/neovim
        make install
      when: neovim_build is succeeded

    - name: Check if Neovim config directory exists
      stat:
        path: "{{ home }}/.config/nvim"
      register: nvim_config_exists

    - name: Clone Neovim configuration
      git:
        repo: https://github.com/samiulsami/nvimconfig.git
        dest: "{{ home }}/.config/nvim"
        force: yes
      become_user: "{{ user }}"
      when: not nvim_config_exists.stat.exists

    - name: Set Neovim as default editor in .zshrc
      lineinfile:
        path: "{{ home }}/.zshrc"
        line: 'export EDITOR="nvim -f"'
        regexp: '^export EDITOR='
        create: yes
      become_user: "{{ user }}"

    - name: Set Neovim as git editor
      shell: "git config --global core.editor 'nvim -f'"
      become_user: "{{ user }}"

    - name: Optional Java JDTLS setup notification
      debug:
        msg: |
          Neovim installation completed!
          
          Optional: For Java development with JDTLS:
          1. Install Java 21+ 
          2. Download latest JDTLS from Eclipse
          3. Extract to $HOME/.eclipse_jdtls
          
          First run: Open nvim and let plugins install automatically.
