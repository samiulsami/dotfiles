---
- name: Verify dotfiles source directory exists
  stat:
    path: "{{ dotfiles_dir }}"
  register: dotfiles_exists
  failed_when: not dotfiles_exists.stat.exists
  tags: validation

- name: Verify required dotfiles exist
  stat:
    path: "{{ dotfiles_dir }}/{{ item }}"
  register: dotfiles_check
  failed_when: not dotfiles_check.stat.exists
  loop:
    - "zsh/.zshrc"
    - "zsh/.zsh_functions_and_widgets"
    - "zsh/.p10k.zsh"
    - "tmux/tmux.conf"
    - "i3wm/config"
    - "rofi/config.rasi"
    - "picom/picom.conf"
    - "dunst/dunstrc"
    - "ghostty/config"
  tags: validation

- name: Create all required directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'
  become_user: "{{ user }}"
  loop:
    - "{{ home }}/.config/rofi"
    - "{{ home }}/.config/picom"
    - "{{ home }}/.config/dunst"
    - "{{ home }}/.config/i3"
    - "{{ home }}/.config/ghostty"
    - "{{ home }}/.config/opencode"
    - "{{ home }}/.config/tmux"
    - "{{ home }}/.zsh"
    - "{{ home }}/.config/tmux/plugins"
  tags: directories

- name: Create all configuration symlinks
  file:
    src: "{{ dotfiles_dir }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: yes
    owner: "{{ user }}"
    group: "{{ user }}"
  become_user: "{{ user }}"
  loop:
    - { src: 'rofi/config.rasi', dest: "{{ home }}/.config/rofi/config.rasi" }
    - { src: 'picom/picom.conf', dest: "{{ home }}/.config/picom/picom.conf" }
    - { src: 'dunst/dunstrc', dest: "{{ home }}/.config/dunst/dunstrc" }
    - { src: 'ghostty/config', dest: "{{ home }}/.config/ghostty/config" }
    - { src: 'tmux/tmux.conf', dest: "{{ home }}/.config/tmux/tmux.conf" }
    - { src: 'zsh/.zshrc', dest: "{{ home }}/.zshrc" }
    - { src: 'zsh/.zsh_functions_and_widgets', dest: "{{ home }}/.zsh_functions_and_widgets" }
    - { src: 'zsh/.p10k.zsh', dest: "{{ home }}/.p10k.zsh" }
    - { src: 'opencode/opencode.json', dest: "{{ home }}/.config/opencode/opencode.json" }
    - { src: 'opencode/AGENTS.md', dest: "{{ home }}/.config/opencode/AGENTS.md" }
  tags: dotfiles

- name: Clone zsh plugins
  git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    depth: 1
    force: yes
  become_user: "{{ user }}"
  loop:
    - { repo: 'https://github.com/jeffreytse/zsh-vi-mode.git', dest: '{{ home }}/.zsh/zsh-vi-mode' }
    - { repo: 'https://github.com/zsh-users/zsh-autosuggestions.git', dest: '{{ home }}/.zsh/zsh-autosuggestions' }
    - { repo: 'https://github.com/zsh-users/zsh-syntax-highlighting.git', dest: '{{ home }}/.zsh/zsh-syntax-highlighting' }
    - { repo: 'https://github.com/romkatv/powerlevel10k.git', dest: '{{ home }}/.zsh/powerlevel10k' }
    - { repo: 'https://github.com/Aloxaf/fzf-tab.git', dest: '{{ home }}/.zsh/fzf-tab' }
    - { repo: 'https://github.com/zsh-users/zsh-completions.git', dest: '{{ home }}/.zsh/zsh-completions' }
  tags: git_clones

- name: Clone tmux plugins
  git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    depth: 1
    force: yes
  become_user: "{{ user }}"
  loop:
    - { repo: 'https://github.com/tmux-plugins/tmux-resurrect', dest: '{{ home }}/.config/tmux/plugins/tmux-resurrect' }
  tags: git_clones

- name: Clone fzf
  git:
    repo: https://github.com/junegunn/fzf.git
    dest: "{{ home }}/.fzf"
    depth: 1
    force: yes
  become_user: "{{ user }}"
  tags: git_clones

- name: Install fzf binaries
  shell: |
    cd {{ home }}/.fzf && ./install --all
  args:
    creates: "{{ home }}/.fzf/bin/fzf"
  become_user: "{{ user }}"
  tags: fzf

- name: Get primary monitor for i3 config
  shell: "xrandr | grep ' connected primary' | awk '{print $1}'"
  register: primary_monitor
  become_user: "{{ user }}"
  ignore_errors: yes

- name: Get secondary monitor for i3 config
  shell: "xrandr | grep ' connected' | grep -v ' connected primary ' | awk '{print $1}'"
  register: secondary_monitor
  become_user: "{{ user }}"
  ignore_errors: yes

- name: Set monitor variables for i3 config
  set_fact:
    monitor1: "{{ primary_monitor.stdout | default('eDP-1') }}"
    monitor2: "{{ secondary_monitor.stdout | default('HDMI-1') }}"

- name: Update i3 config with detected monitors
  replace:
    path: "{{ dotfiles_dir }}/i3wm/config"
    regexp: "^set \\$monitor1 .*"
    replace: "set $monitor1 {{ monitor1 }}"
  become_user: "{{ user }}"

- name: Update i3 config with detected secondary monitor
  replace:
    path: "{{ dotfiles_dir }}/i3wm/config"
    regexp: "^set \\$monitor2 .*"
    replace: "set $monitor2 {{ monitor2 }}"
  become_user: "{{ user }}"

- name: Create i3 config symlink
  file:
    src: "{{ dotfiles_dir }}/i3wm/config"
    dest: "{{ home }}/.config/i3/config"
    state: link
    force: yes
    owner: "{{ user }}"
    group: "{{ user }}"
  become_user: "{{ user }}"
  tags: dotfiles

- name: Source tmux configuration
  shell: |
    tmux source {{ home }}/.config/tmux/tmux.conf
  become_user: "{{ user }}"
  ignore_errors: yes

- name: Source shell configurations  
  shell: |
    source {{ home }}/.zshrc
  args:
    executable: /bin/zsh
  become_user: "{{ user }}"
  ignore_errors: yes

- name: Install GitHub CLI extensions
  shell: |
    gh extension install yusukebe/gh-markdown-preview
  become_user: "{{ user }}"
  ignore_errors: yes
  tags: github

- name: Set git configuration defaults
  git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  become_user: "{{ user }}"
  loop:
    - { name: 'user.name', value: '{{ git_name }}' }
    - { name: 'user.email', value: '{{ git_email }}' }
    - { name: 'url.git@github.com:.insteadOf', value: 'https://github.com/' }
  when: configure_git_defaults | default(true)
