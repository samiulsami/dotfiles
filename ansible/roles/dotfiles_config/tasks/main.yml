---
- name: Verify dotfiles source directory exists
  stat:
    path: "{{ dotfiles_dir }}"
  register: dotfiles_exists
  failed_when: not dotfiles_exists.stat.exists
  tags: validation

- name: Verify required dotfiles exist
  stat:
    path: "{{ dotfiles_dir }}/{{ item }}"
  register: dotfiles_check
  failed_when: not dotfiles_check.stat.exists
  loop:
    - "zsh/.zshrc"
    - "zsh/.zsh_functions_and_widgets"
    - "zsh/.p10k.zsh"
    - "tmux/.tmux.conf"
    - "i3wm/config"
    - "rofi/config.rasi"
    - "picom/picom.conf"
    - "dunst/dunstrc"
    - "ghostty/config"
  tags: validation

- name: Create symlinks for shell configuration files
  file:
    src: "{{ dotfiles_dir }}/{{ item.src }}"
    dest: "{{ home }}/{{ item.dest }}"
    state: link
    force: yes
    owner: "{{ user }}"
    group: "{{ user }}"
  become_user: "{{ user }}"
  loop:
    - { src: 'zsh/.zshrc', dest: '.zshrc' }
    - { src: 'zsh/.zsh_functions_and_widgets', dest: '.zsh_functions_and_widgets' }
    - { src: 'zsh/.p10k.zsh', dest: '.p10k.zsh' }
    - { src: 'tmux/.tmux.conf', dest: '.tmux.conf' }
  tags: dotfiles

- name: Create config directories for symlinks
  file:
    path: "{{ home }}/.config/{{ item }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'
  become_user: "{{ user }}"
  loop:
    - rofi
    - picom
    - dunst
    - ghostty

- name: Create config directory symlinks
  file:
    src: "{{ dotfiles_dir }}/{{ item.src }}"
    dest: "{{ home }}/.config/{{ item.dest }}"
    state: link
    force: yes
    owner: "{{ user }}"
    group: "{{ user }}"
  become_user: "{{ user }}"
  loop:
    - { src: 'rofi/config.rasi', dest: 'rofi/config.rasi' }
    - { src: 'picom/picom.conf', dest: 'picom/picom.conf' }
    - { src: 'dunst/dunstrc', dest: 'dunst/dunstrc' }
    - { src: 'ghostty/config', dest: 'ghostty/config' }
  tags: dotfiles

- name: Create symlink for i3 config
  file:
    src: "{{ dotfiles_dir }}/i3wm/config"
    dest: "{{ home }}/.config/i3/config"
    state: link
    force: yes
    owner: "{{ user }}"
    group: "{{ user }}"
  become_user: "{{ user }}"

- name: Update i3 config with detected monitors
  replace:
    path: "{{ dotfiles_dir }}/i3wm/config"
    regexp: "^set \\$monitor1 .*"
    replace: "set $monitor1 {{ monitor1 }}"
  become_user: "{{ user }}"

- name: Update i3 config with detected secondary monitor
  replace:
    path: "{{ dotfiles_dir }}/i3wm/config"
    regexp: "^set \\$monitor2 .*"
    replace: "set $monitor2 {{ monitor2 }}"
  become_user: "{{ user }}"





- name: Source shell configurations  
  shell: |
    source {{ home }}/.zshrc
  args:
    executable: /bin/zsh
  become_user: "{{ user }}"
  ignore_errors: yes

- name: Install tmux plugins
  shell: |
    {{ home }}/.tmux/plugins/tpm/scripts/install_plugins.sh
  become_user: "{{ user }}"
  ignore_errors: yes

- name: Check if environment variables block exists in .zshrc
  command: grep -q "ANSIBLE MANAGED BLOCK - Environment Variables" "{{ home }}/.zshrc"
  register: env_vars_exist
  changed_when: false
  failed_when: false
  become_user: "{{ user }}"

- name: Add environment variables to .zshrc
  blockinfile:
    path: "{{ home }}/.zshrc"
    block: |
      # {{ ansible_managed }}
      # Environment variables (added by Ansible)
      export GOPATH=$HOME/go
      export PATH=$GOPATH/bin:/usr/local/go/bin:$PATH
      export JAVA_HOME=/usr/lib/jvm/jdk
      export PATH=$JAVA_HOME/bin:$PATH
      export MAVEN_HOME=/usr/lib/mvn/maven
      export PATH=$MAVEN_HOME/bin:$PATH
      export PATH=$HOME/.cargo/bin:$PATH
      export REGISTRY={{ docker_registry | default('sami7786') }}
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Environment Variables"
    insertbefore: EOF
  become_user: "{{ user }}"
  when: env_vars_exist.rc != 0
  tags: shell

- name: Set git configuration defaults
  git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  become_user: "{{ user }}"
  loop:
    - { name: 'user.name', value: '{{ git_name }}' }
    - { name: 'user.email', value: '{{ git_email }}' }
    - { name: 'url.git@github.com:.insteadOf', value: 'https://github.com/' }
  when: configure_git_defaults | default(true)
