---
# Docker installation
- name: Remove old Docker packages
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
    state: absent

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg

- name: Add Docker repository
  shell: |
    echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: yes

- name: Add user to docker group
  user:
    name: "{{ user }}"
    groups: docker
    append: yes

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes

# Java installation
- name: Remove old Java installations
  file:
    path: /usr/lib/jvm
    state: absent

- name: Create JVM directory
  file:
    path: /usr/lib/jvm
    state: directory
    mode: '0755'

- name: Download Java {{ java_version }}
  get_url:
    url: "https://download.oracle.com/java/24/archive/{{ java_version }}_linux-x64_bin.tar.gz"
    dest: "/tmp/{{ java_version }}.tar.gz"
    mode: '0644'

- name: Extract Java
  unarchive:
    src: "/tmp/{{ java_version }}.tar.gz"
    dest: "/tmp"
    remote_src: yes

- name: Move Java to final location
  shell: "mv /tmp/{{ java_version }} /usr/lib/jvm/jdk"
  args:
    creates: /usr/lib/jvm/jdk

- name: Clean up Java download
  file:
    path: "/tmp/{{ java_version }}.tar.gz"
    state: absent

# Maven installation  
- name: Remove old Maven installations
  file:
    path: /usr/lib/mvn
    state: absent

- name: Create Maven directory
  file:
    path: /usr/lib/mvn
    state: directory
    mode: '0755'

- name: Download Maven {{ maven_version }}
  get_url:
    url: "https://dlcdn.apache.org/maven/maven-3/{{ maven_version }}/binaries/apache-maven-{{ maven_version }}-bin.tar.gz"
    dest: "/tmp/maven-{{ maven_version }}.tar.gz"
    mode: '0644'

- name: Extract Maven
  unarchive:
    src: "/tmp/maven-{{ maven_version }}.tar.gz"
    dest: "/tmp"
    remote_src: yes

- name: Move Maven to final location
  shell: "mv /tmp/apache-maven-{{ maven_version }} /usr/lib/mvn/maven"
  args:
    creates: /usr/lib/mvn/maven

- name: Clean up Maven download
  file:
    path: "/tmp/maven-{{ maven_version }}.tar.gz"
    state: absent

# Go installation
- name: Remove old Go installations
  file:
    path: /usr/local/go
    state: absent

- name: Download Go {{ go_version }}
  get_url:
    url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    mode: '0644'

- name: Extract Go
  unarchive:
    src: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: yes

- name: Set Go ownership
  file:
    path: /usr/local/go
    owner: "{{ user }}"
    group: "{{ user }}"
    recurse: yes

- name: Clean up Go download
  file:
    path: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    state: absent

- name: Create user Go directory
  file:
    path: "{{ home }}/go"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'
  become_user: "{{ user }}"

- name: Install Go language server
  shell: |
    export GOPATH={{ home }}/go
    export PATH=$GOPATH/bin:/usr/local/go/bin:$PATH
    /usr/local/go/bin/go install golang.org/x/tools/gopls@latest
  become_user: "{{ user }}"
  args:
    creates: "{{ home }}/go/bin/gopls"

# Kubernetes tools
- name: Download kubectl
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version | default('stable') }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'
  vars:
    kubectl_version: "{{ ansible_local.kubectl_version | default('v1.28.0') }}"

- name: Download kind {{ kind_version }}
  get_url:
    url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
    dest: /usr/local/bin/kind
    mode: '0755'

- name: Download and install Helm
  shell: |
    curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 /tmp/get_helm.sh
    /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm


- name: Check if Gemini CLI is already installed
  stat:
    path: "{{ home }}/.local/share/fnm/aliases/default/bin/gemini"
  register: gemini_installed
  become_user: "{{ user }}"

- name: Install gemini-cli globally
  shell: "{{ home }}/.local/share/fnm/aliases/default/bin/npm install -g @google/gemini-cli"
  become_user: "{{ user }}"
  when: not gemini_installed.stat.exists

- name: Create gemini config directory
  file:
    path: "{{ home }}/.gemini"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'
  become_user: "{{ user }}"