format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$cmd_duration\
${custom.kubeconfig}\
$line_break\
$character"""

add_newline = false

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
style = "blue"
truncation_length = 1234
truncate_to_repo = false

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
style = "blue"
deleted = "-"
modified = "~"
stashed = ""

[git_state]
style = "blue"

[cmd_duration]
format = " [$duration]($style)"
style = "yellow"

[custom.kubeconfig]
command = 'k=$(printf %s "$KUBECONFIG"|tr -d "[:cntrl:]"); set -- $(printf %s "$k"|cksum); printf "\033[38;5;%dm[KUBECONFIG=%s]\033[0m" $((16+$1%216)) "$k"'
when = 'test -f "$KUBECONFIG"'
format = ' $output'
unsafe_no_escape = true
