# Hypridle config

general {
    lock_cmd = pidof hyprlock || hyprlock --grace 0 --immediate-render --no-fade-in
    on_lock_cmd = dunstctl set-paused true
    on_unlock_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'; dunstctl set-paused false
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}

# Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

listener {
    timeout = 305
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "off" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}

listener {
    timeout = 5
    on-timeout = pidof hyprlock && hyprctl dispatch 'hl.dsp.dpms({ action = "off" })'
    on-resume = pidof hyprlock && hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}
